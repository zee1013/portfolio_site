     <link

  />
  <!-- seo 최적화 적용 -->
    <!-- 웹페이지의 설명을 정의 -->
    <meta name="description" content="포트폴리오" />
    <!-- 웹페이지와 관련된 키워드를 정의 -->
    <meta
      name="keywords"
      content="포트폴리오, portfolio"
    />
    <!-- 웹페이지의 저자를 정의  -->
    <meta name="author" content="Eunji Bae" />
    <!-- 소셜 미디어에서 페이지가 공유될때 사용되는 제목 -->
    <meta property="og:title" content="portfolio" />
    <!-- 소셜 미디어에서 페이지가 공유될 때 표시되는 사이트 이름 -->
    <meta property="og:site_name" content="Eunji Bae Portfolio" />
    <!-- 소셜 미디어에서 페이지가 웹사이트임을 명시 -->
    <meta property="og:type" content="website" />
    <!-- Open Graph 프로토콜에서 사용되는 메타 태그의 속성 중 하나로, 
     페이지의 간략한 설명을 제공하는 데 사용 -->
    <!-- 소셜 미디어에서 공유될 때 사용되는 URL -->
    <meta property="og:url" content="https://portfolio-site-omega-beryl-29.vercel.app/" />
    <!-- 소셜 미디어에서 페이지가 공유될 때 표시되는 이미지 -->
    <meta property="og:image" content="" />
    <!-- 소셜 미디어에서 페이지가 공유될 때 사용되는 설명 -->
    <meta
      property="og:description"
      content="Eunji Bae Portfolio"
    />

<script
